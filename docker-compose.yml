---
# 百家号自动化发布系统 Docker Compose
# 服务：nginx / backend / worker / beat / redis / postgres（PRD §13.2）
# 启动：docker compose up -d
# 停止：docker compose down

version: "3.9"

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bjh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bjh_db
      POSTGRES_USER: bjh_user
      POSTGRES_PASSWORD: bjh_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjh_user -d bjh_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bjh_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_backend
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    volumes:
      - ./src/backend:/app
    networks:
      - bjh_net

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_worker
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        celery -A app.workers.celery_app worker
          --loglevel=info
          --concurrency=$${CELERY_WORKER_CONCURRENCY:-1}
          -Q celery
      "
    volumes:
      - ./src/backend:/app
    networks:
      - bjh_net

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_beat
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler
    volumes:
      - ./src/backend:/app
      - beat_data:/app/celerybeat-schedule
    networks:
      - bjh_net

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bjh_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/frontend/dist:/usr/share/nginx/html:ro
    networks:
      - bjh_net

volumes:
  postgres_data:
  redis_data:
  beat_data:

networks:
  bjh_net:
    driver: bridge
