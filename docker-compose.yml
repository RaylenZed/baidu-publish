---
# 百家号自动化发布系统 Docker Compose（单一部署入口）
# 方案：无 Nginx，前后端直接端口访问（适合本地 / Homelab / DDNS）
# 启动：docker compose up -d --build
# 停止：docker compose down

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bjh_postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: bjh_db
      POSTGRES_USER: bjh_user
      POSTGRES_PASSWORD: bjh_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjh_user -d bjh_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bjh_redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_backend
    restart: unless-stopped
    env_file: ./.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    networks:
      - bjh_net

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_worker
    restart: unless-stopped
    env_file: ./.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        celery -A app.workers.celery_app worker
          --loglevel=info
          --concurrency=$${CELERY_WORKER_CONCURRENCY:-1}
          -Q celery
      "
    networks:
      - bjh_net

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_beat
    restart: unless-stopped
    env_file: ./.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler
        -s /app/celery/celerybeat-schedule
    volumes:
      - beat_data:/app/celery
    networks:
      - bjh_net

  # ── Frontend（Vite Preview）────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000/api/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:18000}
    container_name: bjh_frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      VITE_PREVIEW_ALLOWED_HOSTS: ${VITE_PREVIEW_ALLOWED_HOSTS:-*}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-15173}:5173"
    networks:
      - bjh_net

volumes:
  postgres_data:
  redis_data:
  beat_data:

networks:
  bjh_net:
    driver: bridge
