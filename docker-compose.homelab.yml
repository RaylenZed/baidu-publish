---
# 无 Nginx 的 homelab 部署方案（DDNS 域名 + 端口访问）
# 访问示例：
#   前端: http://your-ddns-domain:${FRONTEND_PORT}
#   后端: http://your-ddns-domain:${BACKEND_PORT}

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bjh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bjh_db
      POSTGRES_USER: bjh_user
      POSTGRES_PASSWORD: bjh_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjh_user -d bjh_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  redis:
    image: redis:7-alpine
    container_name: bjh_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bjh_net

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_backend
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    networks:
      - bjh_net

  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_worker
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        celery -A app.workers.celery_app worker
          --loglevel=info
          --concurrency=$${CELERY_WORKER_CONCURRENCY:-1}
          -Q celery
      "
    networks:
      - bjh_net

  beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.backend
    container_name: bjh_beat
    restart: unless-stopped
    env_file: ./src/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler
    volumes:
      - beat_data:/app/celerybeat-schedule
    networks:
      - bjh_net

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000/api/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:18000}
    container_name: bjh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-15173}:5173"
    networks:
      - bjh_net

volumes:
  postgres_data:
  redis_data:
  beat_data:

networks:
  bjh_net:
    driver: bridge
