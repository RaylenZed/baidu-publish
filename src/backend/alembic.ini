# Alembic 配置文件
# 文档：https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 迁移脚本目录
script_location = migrations

# 数据库 URL 在 env.py 中从环境变量动态读取，此处留空
sqlalchemy.url =

[post_write_hooks]
# 迁移文件生成后自动格式化
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
